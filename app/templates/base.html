<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Farros TikTok Bot Admin{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'>
    {% if admin %}
    <header class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-badge">PROD</span>
                <a href="/admin">Farros TikTok Bot</a>
            </div>
            <nav class="nav-links">
                <a href="/admin" class="nav-item {% if request.url.path == '/admin' or request.url.path == '/admin/' %}active{% endif %}">Dashboard</a>
                <a href="/admin/numbers" class="nav-item {% if '/numbers' in request.url.path %}active{% endif %}">Whitelist Nomor</a>
                <a href="/admin/history" class="nav-item {% if '/history' in request.url.path %}active{% endif %}">Riwayat Job</a>
                <a href="/admin/settings" class="nav-item {% if '/settings' in request.url.path %}active{% endif %}">Pengaturan</a>
            </nav>
            <div class="nav-user">
                <span class="username">👤 {{ admin.username }}</span>
                <form action="/admin/logout" method="post" class="inline-form">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            </div>
        </div>
    </header>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 Farros TikTok Bot. Production-Ready WhatsApp & TikTok Gateway.</p>
        </div>
    </footer>

    <script src="/static/main.js"></script>
</body>
</html>
