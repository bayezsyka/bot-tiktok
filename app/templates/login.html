{% extends "base.html" %}

{% block title %}Login - Farros TikTok Bot{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="brand-logo">⚡</div>
            <h1>Farros TikTok Bot</h1>
            <p>Admin Portal Login</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/admin/login" method="post" class="login-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Masukkan username admin">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Masuk ke Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
